<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c"></canvas>
<div id="links"></div>
<script>
// Run this page once in a browser to download all icons
const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
const links = document.getElementById('links');

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#0a0a12';
  ctx.roundRect(0, 0, size, size, size * 0.22);
  ctx.fill();

  // Outer glow
  const glow = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size*0.5);
  glow.addColorStop(0,   'rgba(167,139,250,0.3)');
  glow.addColorStop(0.6, 'rgba(96,165,250,0.1)');
  glow.addColorStop(1,   'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, size, size);

  // Shield shape
  const cx = size / 2, cy = size / 2;
  const sc = size * 0.28;
  ctx.beginPath();
  ctx.moveTo(cx, cy - sc);
  ctx.lineTo(cx + sc * 0.75, cy - sc * 0.5);
  ctx.lineTo(cx + sc * 0.75, cy + sc * 0.2);
  ctx.quadraticCurveTo(cx + sc * 0.75, cy + sc, cx, cy + sc * 1.1);
  ctx.quadraticCurveTo(cx - sc * 0.75, cy + sc, cx - sc * 0.75, cy + sc * 0.2);
  ctx.lineTo(cx - sc * 0.75, cy - sc * 0.5);
  ctx.closePath();

  const shieldGrad = ctx.createLinearGradient(cx - sc, cy - sc, cx + sc, cy + sc);
  shieldGrad.addColorStop(0, '#a78bfa');
  shieldGrad.addColorStop(1, '#60a5fa');
  ctx.fillStyle = shieldGrad;
  ctx.fill();

  // Padlock body (white)
  const ls = size * 0.09;
  const lx = cx - ls * 0.8, ly = cy - ls * 0.2;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.roundRect(lx, ly, ls * 1.6, ls * 1.3, ls * 0.2);
  ctx.fill();

  // Padlock shackle
  ctx.strokeStyle = 'rgba(255,255,255,0.9)';
  ctx.lineWidth = ls * 0.3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, ly, ls * 0.65, Math.PI, 0);
  ctx.stroke();

  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.textContent = `Download icon-${size}.png`;
  a.style.display = 'block';
  a.style.margin = '4px';
  links.appendChild(a);
});

// Auto-click all after 500ms
setTimeout(() => {
  document.querySelectorAll('a').forEach((a, i) => {
    setTimeout(() => a.click(), i * 200);
  });
}, 500);
</script>
</body>
</html>
